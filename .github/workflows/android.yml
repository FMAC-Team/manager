name: Android CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "app/src/**/*.kt"
      - "flutter_nekosu/lib/**/*.dart"
      - "build.gradle.kts"
      - "gradle/libs.versions.toml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "app/src/**/*.kt"
      - "flutter_nekosu/lib/**/*.dart"
      - "build.gradle.kts"
      - "gradle/libs.versions.toml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.6'
        cache: true

    - name: Cache Flutter pub
      uses: actions/cache@v4
      with:
        path: ~/.pub-cache
        key: pub-${{ hashFiles('flutter_nekosu/pubspec.lock') }}
        restore-keys: pub-

    - name: Cache Flutter AAR
      id: cache-aar
      uses: actions/cache@v4
      with:
        path: flutter_nekosu/build/host/outputs/repo
        key: flutter-aar-${{ hashFiles('flutter_nekosu/pubspec.lock', 'flutter_nekosu/lib/**/*.dart') }}

    - name: Build Flutter AAR
      if: steps.cache-aar.outputs.cache-hit != 'true'
      working-directory: flutter_nekosu
      run: |
        flutter pub get
        flutter build aar --no-debug --no-profile

    - name: Cache Zig
      id: cache-zig
      uses: actions/cache@v4
      with:
        path: zig-x86_64-linux-0.15.2
        key: zig-0.15.2

    - name: Download Zig
      if: steps.cache-zig.outputs.cache-hit != 'true'
      run: |
        curl -OL https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz
        tar -xf zig-x86_64-linux-0.15.2.tar.xz

    - name: Cache ncore build
      id: cache-ncore
      uses: actions/cache@v4
      with:
        path: ncore/zig-out
        key: ncore-${{ hashFiles('ncore/**/*.zig') }}
        restore-keys: ncore-

    - name: Build ncore
      run: |
        if [ ! -d "ncore" ]; then
          git clone https://github.com/FMAC-Team/ncore.git
        fi
        if [ "${{ steps.cache-ncore.outputs.cache-hit }}" != 'true' ]; then
          cd ncore
          ../zig-x86_64-linux-0.15.2/zig build \
            -Dtarget=aarch64-linux-android \
            -Doptimize=ReleaseSafe
          cd ..
        fi
        mkdir -p app/src/main/jniLibs/arm64-v8a/
        cp ncore/zig-out/lib/*.so app/src/main/jniLibs/arm64-v8a/

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleRelease

    - name: Upload Release Artifact
      uses: actions/upload-artifact@v6
      with:
        name: release
        path: app/build/outputs/apk/release/*.apk
