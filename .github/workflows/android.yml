name: Android CI

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "app/src/**/*.kt"
      - "flutter/lib/**/*.dart"
      - "build.gradle.kts"
      - "gradle/libs.versions.toml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "app/src/**/*.kt"
      - "flutter/lib/**/*.dart"
      - "build.gradle.kts"
      - "gradle/libs.versions.toml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.6'
        cache: true

    - name: Cache Flutter pub
      uses: actions/cache@v4
      with:
        path: ~/.pub-cache
        key: pub-${{ hashFiles('flutter/pubspec.lock') }}
        restore-keys: pub-

    - name: Cache Flutter AAR
      id: cache-aar
      uses: actions/cache@v4
      with:
        path: flutter/build/host/outputs/repo
        key: flutter-aar-${{ hashFiles('flutter/pubspec.lock', 'flutter/lib/**/*.dart') }}

    - name: Build Flutter AAR
      if: steps.cache-aar.outputs.cache-hit != 'true'
      working-directory: flutter
      run: |
        flutter pub get
        flutter build aar --no-debug --no-profile
        
    - name: Upload Flutter AAR Artifact
      uses: actions/upload-artifact@v6
      with:
        name: flutter-aar-repo
        path: flutter/build/host/outputs/repo/
        if-no-files-found: error

    - name: Build ncore
    - uses: actions/setup-go@v6
      with:
        go-version: '1.25'
      run: |
          git clone https://github.com/FMAC-Team/nekosu.git
          mkdir -p app/src/main/jniLibs/arm64-v8a/
          export SDIR=$PWD
          cd nekosu/userspace/libncore
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 CC=$NDK/toolchains/llvm/prebuilt/linux-aarch64/bin/aarch64-linux-android34-clang go build -buildmode=c-shared -o libncore.so .
          cp zig-out/lib/libncore.so $SDIR/app/src/main/jniLibs/arm64-v8a/

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleRelease

    - name: Upload Release Artifact
      uses: actions/upload-artifact@v6
      with:
        name: release
        path: app/build/outputs/apk/release/*.apk
